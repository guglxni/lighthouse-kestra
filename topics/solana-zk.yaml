id: solana-zk
name: Solana & ZK
description: |
  Solana ecosystem development (Anchor, Pinocchio, SVM internals) plus
  zero-knowledge cryptography research, audit reports, and ZK rollup news.
sources:
  rss:
    - https://solana.com/news/rss.xml
    - https://blog.anza.xyz/rss/
    - https://www.helius.dev/blog/rss.xml
    - https://blog.solana.com/rss/
    - https://www.zksecurity.xyz/blog/index.xml
    - https://blog.zksync.io/rss/
    - https://scrollzkp.com/blog/rss.xml
    - https://blog.succinct.xyz/rss
    - https://a16zcrypto.com/feed/
    - https://research.paradigm.xyz/feed
    - https://vitalik.eth.limo/feed.xml
  arxiv_categories:
    - cs.CR
    - cs.DC
    - cs.PL
  github_queries:
    - "topic:solana stars:>200 pushed:>now-7d"
    - "topic:anchor-lang stars:>50 pushed:>now-14d"
    - "topic:zero-knowledge-proof stars:>200 pushed:>now-7d"
    - "topic:zk-snark stars:>200 pushed:>now-14d"
    - "topic:zkvm stars:>200 pushed:>now-14d"
  hn_keywords:
    - solana
    - "zero knowledge"
    - zk-snark
    - zk-stark
    - zkvm
    - rollup
  reddit_subs:
    - solana
    - solanadev
    - cryptography
    - ethdev
  youtube_channels:
    - "@SolanaFndn"
    - "@a16zcrypto"
    - "@ZKHack"
  web_extra:
    - https://solana.com/docs
    - https://github.com/anchor-lang/anchor/releases.atom
    - https://github.com/firedancer-io/firedancer/releases.atom
    - https://github.com/anza-xyz/agave/releases.atom
schedule: "30 8 * * *"
delivery:
  notion_page_id: "{{ secret('NOTION_PAGE_SOLANA') }}"
  slack_channel: "#solana-zk-brief"
  discord_webhook: "{{ secret('DISCORD_SOLANA') }}"
  email_to: "solana@example.com"
prompts:
  classify: |
    You are scoring items for a "Solana & ZK" research brief.
    Relevant: Solana protocol changes (Anchor, Pinocchio, Agave, Firedancer),
    SVM internals, Solana security audits, ZK proof systems (SNARK/STARK,
    PLONKish, Halo2, Nova/Sangria), zkVMs (RISC Zero, SP1, Jolt), ZK rollups
    (zkSync, Scroll, Linea, Polygon zkEVM, Starknet), modern ZK cryptography
    research. De-prioritise: pure trading content, generic blockchain hype.
    Return: {relevance, category, tags, rationale}.
  summarize: |
    Summarise for a Solana-focused protocol engineer who also tracks ZK research.
    Lead with concrete protocol/version impact or proof-system advance. Cite
    benchmarks where given. 3–5 bullets, no marketing.
ranking:
  top_n_clusters: 5
  min_relevance: 0.6
