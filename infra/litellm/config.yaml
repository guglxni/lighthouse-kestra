# LiteLLM BYOK proxy for Lighthouse. Set keys in `.env` (see `.env.example`).
# Kestra uses OpenAI-compatible URLs: baseUrl = http://litellm:4000/v1

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

model_list:
  - model_name: gpt-5.4
    litellm_params:
      model: openai/gpt-5.4
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-5.5
    litellm_params:
      model: openai/gpt-5.5
      api_key: os.environ/OPENAI_API_KEY

  - model_name: text-embedding-3-small
    litellm_params:
      model: openai/text-embedding-3-small
      api_key: os.environ/OPENAI_API_KEY

  # Optional Azure OpenAI — deployment id must match `azure/<deployment>` (see LiteLLM Azure docs).
  - model_name: kimi-k2.6
    litellm_params:
      model: azure/kimi-k2.6
      api_base: os.environ/AZURE_OPENAI_ENDPOINT
      api_key: os.environ/AZURE_OPENAI_API_KEY

litellm_settings:
  drop_params: true
