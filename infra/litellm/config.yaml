# LiteLLM BYOK proxy — provider-agnostic. Kestra only speaks OpenAI-compatible HTTP
# to LITELLM_BASE_URL; THIS file maps logical model_name → any LiteLLM-supported provider.
# Docs: docs/BYOK.md  |  Providers: https://docs.litellm.ai/docs/providers
#
# Rename model_name values freely; set LITELLM_MODEL_PRIMARY / _FALLBACK to match.

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

model_list:
  # --- Example aliases (replace with your real models) ---
  - model_name: gpt-5.4
    litellm_params:
      model: openai/gpt-5.4
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-5.5
    litellm_params:
      model: openai/gpt-5.5
      api_key: os.environ/OPENAI_API_KEY

  - model_name: text-embedding-3-small
    litellm_params:
      model: openai/text-embedding-3-small
      api_key: os.environ/OPENAI_API_KEY

  - model_name: kimi-k2.6
    litellm_params:
      model: azure/kimi-k2.6
      api_base: os.environ/AZURE_OPENAI_ENDPOINT
      api_key: os.environ/AZURE_OPENAI_API_KEY

  # --- Uncomment / copy-paste patterns (set env vars in `.env`) ---
  #
  # - model_name: claude-opus
  #   litellm_params:
  #     model: anthropic/claude-opus-4-20250514
  #     api_key: os.environ/ANTHROPIC_API_KEY
  #
  # - model_name: gemini-pro
  #   litellm_params:
  #     model: gemini_models/gemini-2.5-pro
  #     api_key: os.environ/GEMINI_API_KEY
  #
  # - model_name: groq-fast
  #   litellm_params:
  #     model: groq/llama-3.3-70b-versatile
  #     api_key: os.environ/GROQ_API_KEY
  #
  # - model_name: ollama-local
  #   litellm_params:
  #     model: ollama/mistral
  #     api_base: os.environ/OLLAMA_BASE_URL
  #     api_key: os.environ/OLLAMA_API_KEY
  #
  # - model_name: openai-compatible-gateway
  #   litellm_params:
  #     model: openai/your-model-id
  #     api_base: os.environ/CUSTOM_LLM_BASE_URL
  #     api_key: os.environ/CUSTOM_LLM_API_KEY

litellm_settings:
  drop_params: true
