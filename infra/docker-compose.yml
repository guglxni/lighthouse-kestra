version: "3.9"

# Lighthouse — orchestrated multi-source research OS.
# `docker compose -f infra/docker-compose.yml up -d`
#
# Stack: Postgres+pgvector, Kestra, LiteLLM (BYOK proxy), Miniflux, SearxNG, worker.

x-postgres-env: &postgres-env
  POSTGRES_USER: ${POSTGRES_USER:-lighthouse}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lighthouse}
  POSTGRES_DB: ${POSTGRES_DB:-lighthouse}

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lighthouse-postgres
    restart: unless-stopped
    environment:
      <<: *postgres-env
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../sql/pgvector_init.sql:/docker-entrypoint-initdb.d/00_pgvector.sql:ro
      - ../sql/schema.sql:/docker-entrypoint-initdb.d/10_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lighthouse} -d ${POSTGRES_DB:-lighthouse}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  litellm:
    # Pin for supply-chain reproducibility (bump intentionally when upgrading).
    image: ghcr.io/berriai/litellm:v1.82.3-stable
    container_name: lighthouse-litellm
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_API_KEY:-sk-lighthouse-local}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      LITELLM_MODE: ${LITELLM_MODE:-single}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      CUSTOM_LLM_BASE_URL: ${CUSTOM_LLM_BASE_URL:-}
      CUSTOM_LLM_API_KEY: ${CUSTOM_LLM_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
    command: ["--config", "/app/config.yaml", "--port", "4000"]

  kestra:
    image: kestra/kestra:v0.21.0
    container_name: lighthouse-kestra
    restart: unless-stopped
    # root + Docker socket: required for Script tasks with Docker runner in this demo stack.
    # For production, use a dedicated worker tier and disable UI basic-auth only behind a reverse proxy.
    user: "root"
    pull_policy: missing
    command: server standalone --worker-thread=8
    depends_on:
      postgres:
        condition: service_healthy
      litellm:
        condition: service_started
    environment:
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-lighthouse}
            driverClassName: org.postgresql.Driver
            username: ${POSTGRES_USER:-lighthouse}
            password: ${POSTGRES_PASSWORD:-lighthouse}
        kestra:
          server:
            basic-auth:
              # Dev default: off. For any host-exposed deployment set true and define users.
              enabled: false
          repository:
            type: postgres
          storage:
            type: local
            local:
              base-path: "/app/storage"
          queue:
            type: postgres
          tasks:
            tmp-dir:
              path: /tmp/kestra-wd/tmp
          url: http://localhost:8080/
      # LiteLLM BYOK — flows should point AI tasks here (OpenAI-compatible).
      SECRET_LITELLM_BASE_URL: ${LITELLM_BASE_URL:-http://litellm:4000/v1}
      SECRET_LITELLM_API_KEY: ${LITELLM_API_KEY:-sk-lighthouse-local}
      SECRET_LITELLM_MODEL_PRIMARY: ${LITELLM_MODEL_PRIMARY:-gpt-5.4}
      SECRET_LITELLM_MODEL_FALLBACK: ${LITELLM_MODEL_FALLBACK:-gpt-5.5}
      # Optional direct provider keys (scripts / emergency — prefer LiteLLM).
      SECRET_OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SECRET_ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SECRET_GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SECRET_NOTION_API_KEY: ${NOTION_API_KEY:-}
      SECRET_SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SECRET_SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      # Base URL for alert deep-links (monitors/alerts); no trailing slash.
      SECRET_KESTRA_PUBLIC_URL: ${KESTRA_PUBLIC_URL:-http://localhost:8080}
      SECRET_DISCORD_WEBHOOK_AGENTIC: ${DISCORD_WEBHOOK_AGENTIC:-}
      SECRET_DISCORD_WEBHOOK_SOLANA: ${DISCORD_WEBHOOK_SOLANA:-}
      SECRET_DISCORD_WEBHOOK_INDIE: ${DISCORD_WEBHOOK_INDIE:-}
      SECRET_DISCORD_WEBHOOK_DATAENG: ${DISCORD_WEBHOOK_DATAENG:-}
      SECRET_SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SECRET_MINIFLUX_TOKEN: ${MINIFLUX_TOKEN:-}
      SECRET_MINIFLUX_URL: http://miniflux:8080
      SECRET_SEARXNG_URL: http://searxng:8080
      SECRET_GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SECRET_REDDIT_USER_AGENT: ${REDDIT_USER_AGENT:-lighthouse-research/0.1}
      SECRET_EXA_API_KEY: ${EXA_API_KEY:-}
      SECRET_EXA_API_BASE: ${EXA_API_BASE:-https://api.exa.ai}
      SECRET_POSTGRES_HOST: postgres
      SECRET_POSTGRES_PORT: "5432"
      SECRET_POSTGRES_DB: ${POSTGRES_DB:-lighthouse}
      SECRET_POSTGRES_USER: ${POSTGRES_USER:-lighthouse}
      SECRET_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lighthouse}
      SECRET_NOTION_PAGE_AGENTIC: ${NOTION_PAGE_AGENTIC:-}
      SECRET_NOTION_PAGE_SOLANA: ${NOTION_PAGE_SOLANA:-}
      SECRET_NOTION_PAGE_INDIE: ${NOTION_PAGE_INDIE:-}
      SECRET_NOTION_PAGE_DATAENG: ${NOTION_PAGE_DATAENG:-}
      SECRET_S3_BUCKET: ${S3_BUCKET:-}
      SECRET_S3_REGION: ${S3_REGION:-us-east-1}
      SECRET_AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      SECRET_AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    volumes:
      - kestra-storage:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - ../flows:/app/flows:ro
    ports:
      - "8080:8080"

  miniflux:
    image: miniflux/miniflux:2.2.5
    container_name: lighthouse-miniflux
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-lighthouse}:${POSTGRES_PASSWORD:-lighthouse}@postgres:5432/miniflux?sslmode=disable
      RUN_MIGRATIONS: "1"
      CREATE_ADMIN: "1"
      ADMIN_USERNAME: ${MINIFLUX_ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${MINIFLUX_ADMIN_PASSWORD:-changeme1234}
      WEBHOOK_SECRET: ${MINIFLUX_WEBHOOK_SECRET:-changeme}
    ports:
      - "8081:8080"

  searxng:
    image: searxng/searxng:latest
    container_name: lighthouse-searxng
    restart: unless-stopped
    environment:
      BASE_URL: http://localhost:8082/
      INSTANCE_NAME: lighthouse
    ports:
      - "8082:8080"
    volumes:
      - searxng-data:/etc/searxng

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    image: lighthouse/worker:latest
    container_name: lighthouse-worker
    command: ["sleep", "infinity"]
    volumes:
      - worker-cache:/cache

volumes:
  postgres-data:
  kestra-storage:
  searxng-data:
  worker-cache:
