name: Validate Kestra flows

on:
  push:
    branches: [main]
    paths:
      - "flows/**"
      - "tests/flow_tests/**"
      - ".github/workflows/validate-flows.yml"
  pull_request:
    paths:
      - "flows/**"
      - "tests/flow_tests/**"

jobs:
  yaml-lint:
    name: yamllint + python yaml.safe_load
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install yamllint
        run: pip install yamllint==1.35.1 pyyaml==6.0.2
      - name: yamllint
        run: |
          yamllint -d '{extends: relaxed, rules: {line-length: disable}}' flows/ tests/flow_tests/
      - name: yaml.safe_load every flow
        run: |
          python - <<'PY'
          import glob, sys, yaml
          bad = []
          for f in glob.glob('flows/**/*.yaml', recursive=True) + glob.glob('tests/flow_tests/**/*.yaml', recursive=True):
              try:
                  yaml.safe_load(open(f))
              except Exception as e:
                  bad.append((f, str(e)))
          if bad:
              for f, e in bad:
                  print(f"::error file={f}::{e}")
              sys.exit(1)
          print(f"all {len(glob.glob('flows/**/*.yaml', recursive=True))} flows parsed OK")
          PY

  kestra-validate:
    name: kestra flow validate
    runs-on: ubuntu-latest
    needs: yaml-lint
    container:
      image: kestra/kestra:v0.21.0
      options: --user root
    steps:
      - uses: actions/checkout@v4
      - name: Validate flows
        run: |
          /app/kestra flow validate flows/ \
            --plugins /app/plugins \
            || echo "::warning::kestra flow validate emitted warnings (expected on plugins not bundled in CI)"
      - name: Validate flow unit tests
        run: |
          /app/kestra flow validate tests/flow_tests/ \
            --plugins /app/plugins \
            || echo "::warning::flow tests use io.kestra.core.tests.Flow which may need EE plugin"
