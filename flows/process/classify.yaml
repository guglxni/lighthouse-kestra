id: classify
namespace: company.team.lighthouse.process
description: |
  Classify recent documents into Lighthouse taxonomy via LiteLLM
  (OpenAI-compatible). When `use_multi_llm` is true, a failed primary
  completion is retried with `LITELLM_MODEL_FALLBACK` (same base URL).

labels:
  layer: process

inputs:
  - id: topic_id
    type: STRING
    defaults: agentic-eng
  - id: limit
    type: INT
    defaults: 20
  - id: use_multi_llm
    type: BOOLEAN
    defaults: false

tasks:
  - id: classify_batch
    type: io.kestra.plugin.scripts.python.Script
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      image: lighthouse/worker:latest
    env:
      PGHOST: "{{ secret('POSTGRES_HOST') }}"
      PGPORT: "{{ secret('POSTGRES_PORT') }}"
      PGDATABASE: "{{ secret('POSTGRES_DB') }}"
      PGUSER: "{{ secret('POSTGRES_USER') }}"
      PGPASSWORD: "{{ secret('POSTGRES_PASSWORD') }}"
      LITELLM_BASE_URL: "{{ secret('LITELLM_BASE_URL') }}"
      LITELLM_API_KEY: "{{ secret('LITELLM_API_KEY') }}"
      MODEL_PRIMARY: "{{ secret('LITELLM_MODEL_PRIMARY') }}"
      MODEL_FALLBACK: "{{ secret('LITELLM_MODEL_FALLBACK') }}"
      TOPIC_ID: "{{ inputs.topic_id }}"
      DOC_LIMIT: "{{ inputs.limit }}"
      USE_MULTI: "{{ inputs.use_multi_llm }}"
    script: |
      import json, os
      import httpx
      import psycopg

      def chat_json(model: str, sys_prompt: str, user_msg: str):
          base = os.environ["LITELLM_BASE_URL"].rstrip("/")
          key = os.environ["LITELLM_API_KEY"]
          payload = {
              "model": model,
              "messages": [
                  {"role": "system", "content": sys_prompt},
                  {"role": "user", "content": user_msg},
              ],
              "temperature": 0.2,
              "response_format": {"type": "json_object"},
          }
          headers = {"Authorization": f"Bearer {key}", "Content-Type": "application/json"}
          with httpx.Client(timeout=120.0) as client:
              r = client.post(f"{base}/chat/completions", json=payload, headers=headers)
              r.raise_for_status()
              msg = r.json()["choices"][0]["message"]["content"]
          return json.loads(msg)

      topic = os.environ["TOPIC_ID"]
      limit = int(os.environ["DOC_LIMIT"])
      use_multi = os.environ["USE_MULTI"].lower() in ("true", "1", "yes")
      primary = os.environ["MODEL_PRIMARY"]
      fallback = os.environ["MODEL_FALLBACK"]

      conn = psycopg.connect(
          host=os.environ["PGHOST"],
          port=os.environ["PGPORT"],
          dbname=os.environ["PGDATABASE"],
          user=os.environ["PGUSER"],
          password=os.environ["PGPASSWORD"],
      )

      sql = """
      SELECT d.id, d.title, left(COALESCE(d.raw_text,''), 12000)
      FROM lh.documents d
      WHERE d.topic_id = %s
        AND length(COALESCE(d.raw_text,'')) > 64
        AND NOT EXISTS (
          SELECT 1 FROM lh.classifications c WHERE c.document_id = d.id AND c.model = %s
        )
      ORDER BY d.published_at DESC NULLS LAST, d.fetched_at DESC
      LIMIT %s;
      """
      rows = []
      with conn.cursor() as cur:
          cur.execute(sql, (topic, primary, limit))
          rows = cur.fetchall()

      sys_prompt = (
          "You label research documents. Reply JSON only with keys: "
          "relevance (0-1 float), category (short string), tags (string array), rationale (string). "
      )

      inserted = 0
      for doc_id, title, text in rows:
          user_msg = f"Title: {title}\n\nBody:\n{text}"
          try:
              data = chat_json(primary, sys_prompt, user_msg)
              model_used = primary
          except Exception as exc:
              print(f"primary model failed for {doc_id}: {exc}")
              if not use_multi:
                  continue
              try:
                  data = chat_json(fallback, sys_prompt, user_msg)
                  model_used = fallback
              except Exception as exc2:
                  print(f"fallback model failed for {doc_id}: {exc2}")
                  continue

          rel = float(data.get("relevance", 0))
          cat = data.get("category")
          tags = data.get("tags") or []
          if not isinstance(tags, list):
              tags = [str(tags)] if tags is not None else []
          tags = [str(t) for t in tags][:64]
          rationale = data.get("rationale")

          with conn.cursor() as cur:
              cur.execute(
                  """
                  INSERT INTO lh.classifications (document_id, topic_id, relevance, category, tags, rationale, model)
                  VALUES (%s::uuid, %s, %s, %s, %s, %s, %s)
                  ON CONFLICT (document_id, topic_id, model) DO UPDATE
                    SET relevance = EXCLUDED.relevance,
                        category = EXCLUDED.category,
                        tags = EXCLUDED.tags,
                        rationale = EXCLUDED.rationale
                  """,
                  (str(doc_id), topic, rel, cat, tags, rationale, model_used),
              )
          inserted += 1

      conn.commit()
      conn.close()
      print(f"classified {inserted} documents (attempted {len(rows)})")

  - id: demo_ai_plugin
    type: io.kestra.plugin.ai.completion.Classification
    description: |
      Reference task — validates `io.kestra.plugin.ai.provider.OpenAI` supports
      `baseUrl` for LiteLLM (see Kestra MCP `task_schema`). Disabled sample text;
      relies on `runIf: false` pattern below — replace with real content when moving off script batch.
    runIf: "false"
    allowFailure: true
    provider:
      type: io.kestra.plugin.ai.provider.OpenAI
      apiKey: "{{ secret('LITELLM_API_KEY') }}"
      baseUrl: "{{ secret('LITELLM_BASE_URL') }}"
      modelName: "{{ secret('LITELLM_MODEL_PRIMARY') }}"
    classes:
      - low
      - medium
      - high
    prompt: "Classify relevance of this stub text about Kestra workflows."

triggers:
  - id: schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "15 */4 * * *"
    inputs:
      topic_id: agentic-eng
      use_multi_llm: false

errors:
  - id: log_failure
    type: io.kestra.plugin.core.log.Log
    level: ERROR
    message: "classify failed: {{ errorLogs() }}"
