id: indie-saas
name: Indie SaaS
description: |
  Bootstrapped + small-team SaaS — distribution, pricing, growth, building
  in public, and the operational stack solo founders use.
sources:
  rss:
    - https://www.indiehackers.com/feed.xml
    - https://www.lennysnewsletter.com/feed
    - https://stripe.com/blog/feed.rss
    - https://www.notion.so/blog/rss
    - https://www.profitwell.com/recur/all/rss.xml
    - https://www.starterstory.com/rss
    - https://tinyseed.com/feed
    - https://www.microconf.com/feed/
    - https://wip.co/rss
    - https://news.ycombinator.com/rss
  arxiv_categories: []
  github_queries:
    - "topic:saas-boilerplate stars:>500 pushed:>now-30d"
    - "topic:billing stars:>500 pushed:>now-30d"
  hn_keywords:
    - "show hn"
    - bootstrap
    - "indie hacker"
    - "side project"
    - "solo founder"
  reddit_subs:
    - SaaS
    - Entrepreneur
    - SideProject
    - indiehackers
  youtube_channels:
    - "@StarterStory"
    - "@MicroConf"
    - "@LennysPodcast"
  web_extra:
    - https://news.ycombinator.com/show
    - https://www.producthunt.com
schedule: "0 9 * * *"
delivery:
  notion_page_id: "{{ secret('NOTION_PAGE_INDIE') }}"
  slack_channel: "#indie-saas-brief"
  discord_webhook: "{{ secret('DISCORD_INDIE') }}"
  email_to: "indie@example.com"
prompts:
  classify: |
    You are scoring items for an "Indie SaaS" research brief.
    Relevant: bootstrapped SaaS launches with revenue specifics, distribution
    tactics that worked (with metrics), pricing experiments, growth case
    studies, useful stripe/notion/posthog/etc. product changes, operational
    tooling for solo founders, hiring-first-employee playbooks. De-prioritise:
    VC-funded mega-rounds, generic productivity content, motivational posts.
    Return: {relevance, category, tags, rationale}.
  summarize: |
    Summarise for a solo SaaS founder. Lead with the concrete number
    (MRR, conversion %, CAC, churn). Include the tactic. 3–5 bullets, no fluff.
ranking:
  top_n_clusters: 5
  min_relevance: 0.55
