id: brief
namespace: company.team.lighthouse.deliver
description: |
  Load today's `lh.briefs` row and fan out to:
  1. Operator-level channels: Discord (per-topic webhook secrets) + Slack (env var).
  2. Per-user channels: calls /api/notify on the demo so every subscriber's
     configured Slack/Discord webhook receives the brief.

labels:
  layer: deliver

inputs:
  - id: topic_id
    type: STRING
    defaults: agentic-eng

tasks:
  - id: deliver
    type: io.kestra.plugin.scripts.python.Script
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      image: lighthouse/worker:latest
    env:
      PGHOST: "{{ secret('POSTGRES_HOST') }}"
      PGPORT: "{{ secret('POSTGRES_PORT') }}"
      PGDATABASE: "{{ secret('POSTGRES_DB') }}"
      PGUSER: "{{ secret('POSTGRES_USER') }}"
      PGPASSWORD: "{{ secret('POSTGRES_PASSWORD') }}"
      TOPIC_ID: "{{ inputs.topic_id }}"
      DISCORD_AGENTIC: "{{ secret('DISCORD_WEBHOOK_AGENTIC') }}"
      DISCORD_SOLANA: "{{ secret('DISCORD_WEBHOOK_SOLANA') }}"
      DISCORD_INDIE: "{{ secret('DISCORD_WEBHOOK_INDIE') }}"
      DISCORD_DATAENG: "{{ secret('DISCORD_WEBHOOK_DATAENG') }}"
      SLACK_WEBHOOK_URL: "{{ secret('SLACK_WEBHOOK_URL') }}"
      DEMO_NOTIFY_URL: "{{ kv('DEMO_NOTIFY_URL') }}"
      DEMO_NOTIFY_SECRET: "{{ kv('DEMO_NOTIFY_SECRET') }}"
    script: |
      import os
      import httpx
      import psycopg

      topic = os.environ["TOPIC_ID"]

      # ── operator-level per-topic Discord hooks (set as Kestra secrets) ──
      hooks = {
        "agentic-eng": os.environ.get("DISCORD_AGENTIC") or "",
        "solana-zk": os.environ.get("DISCORD_SOLANA") or "",
        "indie-saas": os.environ.get("DISCORD_INDIE") or "",
        "data-eng-ai": os.environ.get("DISCORD_DATAENG") or "",
      }
      discord_url = hooks.get(topic, "")

      conn = psycopg.connect(
          host=os.environ["PGHOST"],
          port=os.environ["PGPORT"],
          dbname=os.environ["PGDATABASE"],
          user=os.environ["PGUSER"],
          password=os.environ["PGPASSWORD"],
      )
      with conn.cursor() as cur:
          cur.execute(
              "SELECT markdown FROM lh.briefs WHERE topic_id = %s AND date = now()::date ORDER BY created_at DESC LIMIT 1",
              (topic,),
          )
          row = cur.fetchone()
      conn.close()

      if not row:
          print("no brief for today; skipping delivery")
          raise SystemExit(0)

      md = row[0]
      text = md if len(md) < 1900 else md[:1900] + "…"

      # ── 1. Operator-level channels (existing env-var webhooks) ──
      targets = []
      if discord_url:
          targets.append(("discord", discord_url))
      slack = os.environ.get("SLACK_WEBHOOK_URL") or ""
      if slack:
          targets.append(("slack", slack))

      for kind, url in targets:
          if not url.startswith("https://"):
              print(f"skip {kind}: webhook must use https://")
              continue
          payload = {"content": text} if kind == "discord" else {"text": text}
          with httpx.Client(timeout=30.0) as client:
              r = client.post(url, json=payload)
              if r.status_code >= 400:
                  print(f"delivery failed {r.status_code}: {r.text}")

      # ── 2. Per-user channels: fan out via the demo /api/notify endpoint ──
      notify_url = (os.environ.get("DEMO_NOTIFY_URL") or "").rstrip("/") + "/api/notify"
      notify_secret = os.environ.get("DEMO_NOTIFY_SECRET") or ""
      if notify_url and notify_secret:
          try:
              with httpx.Client(timeout=30.0) as client:
                  resp = client.post(
                      notify_url,
                      json={"topic_id": topic, "markdown": md},
                      headers={"Authorization": f"Bearer {notify_secret}"},
                  )
              print(f"notify: HTTP {resp.status_code} {resp.text[:200]}")
          except Exception as exc:
              # Best-effort: log but don't fail the flow.
              print(f"notify call failed (non-fatal): {exc}")
      else:
          print("notify: DEMO_NOTIFY_URL or DEMO_NOTIFY_SECRET not set, skipping per-user delivery")

triggers:
  - id: morning
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 8 * * *"
    inputs:
      topic_id: agentic-eng

errors:
  - id: log_failure
    type: io.kestra.plugin.core.log.Log
    level: ERROR
    message: "deliver.brief failed: {{ errorLogs() }}"
